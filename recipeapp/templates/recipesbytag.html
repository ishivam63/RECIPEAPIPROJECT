{%extends 'base.html'%}
{%load static%}
{%block main%}

<div class="uk-section uk-section-default">
  <div class="uk-container">
    <div data-uk-grid>
      <div class="uk-width-1-4@m sticky-container">
        <div data-uk-sticky="offset: 100; bottom: true; media: @m;">
        <h2>Recipes</h2>
          <ul class="uk-nav-default uk-nav-parent-icon uk-nav-filter uk-margin-medium-top" data-uk-nav>
            <li class="uk-parent uk-open">
              <a href="#">Dish Type</a>
              <ul class="uk-nav-sub">
                {%for tag in tags%}
                  <li><a href="/recipesbytag/{{tag}}">{{tag}}</a></li>
                {%endfor%}
              </ul>
            </li>
          </ul>
        </div>
      </div>
      <div class="uk-width-expand@m">
        <div data-uk-grid>

        </div>
        <div class="uk-child-width-1-2 uk-child-width-1-3@s" data-uk-grid>


          {%for recipe in recipes%}
          <div>
            <div
              class="uk-card">
              <div class="uk-card-media-top uk-inline uk-light">
                <img class="uk-border-rounded-medium" src={{recipe.image}} alt="Course Title">
                <div class="uk-position-cover uk-card-overlay uk-border-rounded-medium"></div>
                <div class="uk-position-xsmall uk-position-top-right">
                  <a href="#" class="uk-icon-button uk-like uk-position-z-index uk-position-relative"
                    data-uk-icon="heart"></a>
                </div>
              </div>
              <div>
                <h3 class="uk-card-title uk-text-500 uk-margin-small-bottom uk-margin-top">{{recipe.name}}</h3>
                <div class="uk-text-xsmall uk-text-muted" data-uk-grid>
                  <div class="uk-width-auto uk-flex uk-flex-middle">
                    <span class="uk-rating-filled" data-uk-icon="icon: star; ratio: 0.7"></span>
                    <span class="uk-margin-xsmall-left">{{recipe.rating}}</span>
                    <span>( {{recipe.reviewCount}} )</span>
                  </div>
                  <div class="uk-width-expand uk-text-right">{{recipe.cuisine}}</div>
                </div>
              </div>
                <a href="/recipedetails/{{recipe.id}}" class="uk-position-cover"></a>
              </div>
          </div>
          {%endfor%}

      </div>
    </div>
  </div>
</div>



{%endblock%}
